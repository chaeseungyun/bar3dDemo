<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar3D 프로토타입 — echarts-gl</title>
  <style>
    html, body { margin: 0; height: 100%; background: #ffffff; font-family: "Times New Roman", serif; }
    #app { width: 100vw; height: 100vh; }
    #panel {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(255,255,255,0.9); border: 1px solid #ddd; border-radius: 6px;
      padding: 10px 12px; font-family: system-ui, sans-serif; font-size: 13px; color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #panel label { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    #panel .title { font-weight: 600; margin-bottom: 6px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
</head>
<body>
  <div id="panel">
    <div class="title">echarts-gl bar3D 프로토타입</div>
    <label><input type="checkbox" id="edges" /> 막대 외곽선(edge)</label>
    <label>막대 굵기 <input type="range" id="barsize" min="20" max="100" value="70" /></label>
    <label>격자 밀도
      <select id="density">
        <option value="1">50 × 36 (1,800)</option>
        <option value="2">50 × 18 (900)</option>
        <option value="0.5" selected>25 × 18 (450)</option>
      </select>
    </label>
  </div>
  <div id="app"></div>

  <script>
    // ---- jet 컬러맵 근사 (파랑→청록→노랑→빨강) ----
    const JET = [
      '#00007F', '#0000FF', '#007FFF', '#00FFFF',
      '#7FFF7F', '#FFFF00', '#FF7F00', '#FF0000', '#7F0000'
    ];

    // ---- 스펙과 유사한 합성 데이터 생성 ----
    // Cycle: 0~50 (x), Phase: 0~360 (y), Amplitude: 0~1 (z)
    // 중앙-후방(높은 phase, 중간 cycle)에 높은 진폭이 몰린 형태
    let seed = 20240703;
    function rand() { // 재현 가능한 의사난수
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      return seed / 0x7fffffff;
    }
    function buildData(nx, ny) {
      const data = [];
      const cx = 22, cy = 230, sx = 12, sy = 90; // 진폭 언덕 중심/폭
      for (let i = 0; i < nx; i++) {
        for (let j = 0; j < ny; j++) {
          const cycle = (i + 0.5) * (50 / nx);
          const phase = (j + 0.5) * (360 / ny);
          const env = Math.exp(-((cycle - cx) ** 2) / (2 * sx * sx)
                             - ((phase - cy) ** 2) / (2 * sy * sy));
          const noise = rand();
          // 언덕 부근은 높고, 전반적으로 바닥엔 낮은 잡음
          const amp = Math.min(1, Math.max(0.02, env * (0.6 + 0.4 * noise) + 0.12 * noise));
          data.push([cycle, phase, +amp.toFixed(3)]);
        }
      }
      return data;
    }

    const chart = echarts.init(document.getElementById('app'));

    function render() {
      const density = parseFloat(document.getElementById('density').value);
      const nx = Math.round(50 * (density >= 1 ? 1 : density));
      const ny = Math.round(36 * (density === 2 ? 0.5 : density >= 1 ? 1 : density));
      const showEdges = document.getElementById('edges').checked;
      const barSize = parseInt(document.getElementById('barsize').value, 10) / 100;

      const data = buildData(nx, ny);

      chart.setOption({
        backgroundColor: '#ffffff',
        tooltip: {},
        visualMap: {
          show: true,
          dimension: 2,
          min: 0, max: 1,
          calculable: true,
          left: 'right', bottom: 40,
          text: ['1', '0'],
          inRange: { color: JET }
        },
        xAxis3D: { type: 'value', name: 'Cycle', min: 0, max: 50,
          nameTextStyle: { fontSize: 16, fontWeight: 'bold' } },
        yAxis3D: { type: 'value', name: 'Phase(°)', min: 0, max: 360,
          axisLabel: { formatter: v => [0,90,180,270,360].includes(v) ? v : '' },
          nameTextStyle: { fontSize: 16, fontWeight: 'bold' } },
        zAxis3D: { type: 'value', name: 'Relative amplitude', min: 0, max: 1,
          nameTextStyle: { fontSize: 16, fontWeight: 'bold' } },
        grid3D: {
          boxWidth: 120, boxDepth: 120, boxHeight: 70,
          viewControl: { alpha: 20, beta: 40, distance: 200, autoRotate: false },
          axisLine: { lineStyle: { color: '#333' } },
          axisPointer: { show: false },
          splitLine: { lineStyle: { color: '#e0e0e0' } },
          light: {
            main: { intensity: 1.2, shadow: false },
            ambient: { intensity: 0.4 }
          },
          environment: '#ffffff'
        },
        series: [{
          type: 'bar3D',
          data: data,
          shading: 'lambert',
          barSize: [barSize * (25 / nx) * 8, barSize * (25 / ny) * 8],
          bevelSize: 0,
          itemStyle: {
            opacity: 1,
            borderWidth: showEdges ? 0.8 : 0,
            borderColor: showEdges ? '#222' : undefined
          },
          emphasis: { itemStyle: { color: '#fff' } }
        }]
      }, true);
    }

    render();
    document.getElementById('edges').addEventListener('change', render);
    document.getElementById('barsize').addEventListener('input', render);
    document.getElementById('density').addEventListener('change', render);
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
